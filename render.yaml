services:
  - type: web
    name: family-asset-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: family-asset-db
          property: connectionString

databases:
  - name: family-asset-db
    plan: free
